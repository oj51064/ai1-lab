<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="pieces" class="pieces">
            <div class="piece" draggable="true" id="piece1">1</div>
            <div class="piece" draggable="true" id="piece2">2</div>
            <div class="piece" draggable="true" id="piece3">3</div>
            <div class="piece" draggable="true" id="piece4">4</div>
        </div>
        <div id="target" class="target">
            <div class="target-piece" id="target1"></div>
            <div class="target-piece" id="target2"></div>
            <div class="target-piece" id="target3"></div>
            <div class="target-piece" id="target4"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
